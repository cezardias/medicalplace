version: '3'

services:

  medical-app:
    build:
      context: ./
      dockerfile: Dockerfile
    container_name: medical-app
    hostname: medical-app
    restart: always
    depends_on:
      - 'mysql'
      - 'redis'
    ports:
      - '8000:80'

  mysql:
    image: mysql:5.7
    container_name: mysql-server
    hostname: mysql-server
    restart: always
    environment:
      - MYSQL_ROOT_PASSWORD=123456
      - MYSQL_DATABASE=medicalplace_dev
    volumes:
      - mysql-volume:/var/lib/mysql
      - ./docker/mysql/init:/docker-entrypoint-initdb.d
    ports:
      - '3306:3306'
  
  redis:
    image: redis:latest
    container_name: redis-server
    hostname: redis-server
    restart: always
    volumes:
      - redis-volume:/data
    ports:
      - '6379:6379'

volumes:
  mysql-volume: {}
  redis-volume: {}