server {
    listen 80;
    server_name teste.medicalplace.med.br;

    location / {
        proxy_pass http://127.0.0.1:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Increase upload size for images
        client_max_body_size 64M;

        # Timeouts for long-running scheduling operations
        proxy_read_timeout 300;
        proxy_connect_timeout 300;
        proxy_send_timeout 300;
    }

    # Optional: SSL Configuration (should be added after certbot runs)
    # listen 443 ssl;
    # ssl_certificate /etc/letsencrypt/live/teste.medicalplace.med.br/fullchain.pem;
    # ssl_certificate_key /etc/letsencrypt/live/teste.medicalplace.med.br/privkey.pem;
}
